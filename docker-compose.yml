version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: impactmatch-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: impactmatch
    volumes:
      - mongo_data:/data/db
    networks:
      - impactmatch

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impactmatch-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/impactmatch
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      CHECK_IN_RADIUS_METERS: 200
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - impactmatch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: impactmatch-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - impactmatch

volumes:
  mongo_data:

networks:
  impactmatch:
    driver: bridge
